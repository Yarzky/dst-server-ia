# =====================================================================
# Don't Starve Together (DST) Caves Shard Configuration
# =====================================================================
# This file configures the connection ports and shard details for the
# Caves shard. Each shard on a server must have unique ports.
# =====================================================================

[NETWORK]
# The UDP port that clients (players) use to connect to this specific shard.
# Must be unique across all running shards in the same host/container.
server_port = 11001


[SHARD]
# Set to false because this is a secondary shard, not the master.
is_master = false

# The name of the shard. Must match the folder name and command line args.
name = Caves

# A unique numeric identifier for this shard.
id = 4


[STEAM]
# Port used by Steam for server listing query.
# Must be unique across all running shards.
master_server_port = 27019

# Port used for authenticating players connecting via Steam.
# Must be unique across all running shards.
authentication_port = 8769


[ACCOUNT]
# Encodes user paths using their SteamIDs to organize user save paths cleanly.
encode_user_path = true
