# =====================================================================
# Don't Starve Together (DST) Island Shard Configuration (Master Shard)
# =====================================================================
# This file configures the connection ports and shard details for the
# Island shard.
#
# NOTE: This shard is configured as the Master Shard (is_master = true).
# The master shard coordinates all other shards (Caves, Master, Volcano)
# and acts as the entry point for inter-shard portal migrations.
# =====================================================================

[NETWORK]
# The UDP port that clients (players) use to connect to this specific shard.
# Must be unique across all running shards in the same host/container.
server_port = 10998


[SHARD]
# Set to true because this shard is the coordinator for the entire cluster.
# Only ONE shard in the cluster can be the master.
is_master = true


[ACCOUNT]
# Encodes user paths using their SteamIDs to organize user save paths cleanly.
encode_user_path = true
