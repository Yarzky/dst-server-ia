# =====================================================================
# Don't Starve Together (DST) Cluster Configuration File
# =====================================================================
# This file configures cluster-wide settings, including gameplay rules,
# server descriptions, connection passwords, and inter-shard communication.
# for more information, look at the wiki: https://dontstarve.wiki.gg/wiki/Guides/Don%E2%80%99t_Starve_Together_Dedicated_Servers#cluster.ini_and_server.ini
# =====================================================================

[GAMEPLAY]
# Game mode style: survival, endless, wilderness.  
game_mode = survival

# Maximum number of players allowed to connect to the server at once.
max_players = 6

# Enable Player vs Player damage.
pvp = false

# Automatically pause world time and tick rate when no players are online.
# This prevents world decay/corruption and crop rot when offline.
pause_when_empty = true


[NETWORK]
# The description of your server shown in the server browser.
cluster_description = Base Template - Multi-shard dedicated server

# The name of your server shown in the server browser.
cluster_name = DST Dedicated Server Base

# The password required for players to join the server.
# Leave blank (e.g. cluster_password = ) for a public server.
cluster_password = change_this_password


[MISC]
# Enable the remote admin console (~ key in-game) for admin users.
console_enabled = true


[SHARD]
# Must be set to true if running a multi-shard server (e.g. Surface + Caves).
shard_enabled = true

# The IP address that shards use to listen for incoming connections from other shards.
# Set to 127.0.0.1 because all shards run locally inside the same network stack.
bind_ip = 127.0.0.1

# The IP address of the Master shard.
# Set to 127.0.0.1 since the Master shard runs in the same container.
master_ip = 127.0.0.1

# The internal port the Master shard listens on for secundary shard connections.
master_port = 10889

# A secret password used by shards to authenticate with each other.
# Make sure all shards and the master have the exact same cluster_key.
cluster_key = change_this_secret_key
